    title: Single bidder on high-value procurement process
    description: Flags suppliers exposed through single-bidder or effectively single-bidder awards above value thresholds.
    category: procurement
    severity: high
    entity_types: [Company]
    public_safe: true
    reviewer_only: false
    requires_identity: [EXACT_COMPANY_NIT]
    sources_required: [secop_offers, secop_ii_processes, secop_ii_contracts]
    scope_type: procurement_process
    dedup_fields: [scope_key]
    runner:
      kind: cypher
      ref: procurement_single_bidder_high_value
    public_policy:
      allow_public: true
      require_public_evidence: true
      require_exact_identity: true
      allowed_identity_match_types: [EXACT_COMPANY_NIT]
      allow_person_entities: false
    evidence_mapping:
      item_type: procurement_reference
      node_ref_field: node_ref
    dedup_key_template: signal:{id}:entity:{entity_key}:scope:{scope_key}

