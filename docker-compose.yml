name: co-acc

services:
  neo4j:
    container_name: coacc-neo4j
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-none}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-1G}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-2G}
      NEO4J_dbms_memory_transaction_total_max: ${NEO4J_TX_TOTAL_MAX:-2G}
      NEO4J_db_tx__log_rotation_retention__policy: "1 files"
    volumes:
      - neo4j-data:/data
      - ./infra/neo4j/import:/var/lib/neo4j/import
      - ./infra/neo4j/init.cypher:/var/lib/neo4j/init.cypher
    healthcheck:
      test: ["CMD", "cypher-shell", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      COACC_SOURCE_REGISTRY_PATH: /app/docs/source_registry_co_v1.csv
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      INVITE_CODE: ${INVITE_CODE:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_ENV: ${APP_ENV:-dev}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3100}
    volumes:
      - ./docs/source_registry_co_v1.csv:/app/docs/source_registry_co_v1.csv:ro
      - ./api/src/coacc/data/watchlists:/app/src/coacc/data/watchlists
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy

  etl:
    build: ./etl
    profiles: ["etl"]
    working_dir: /workspace
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace
    depends_on:
      neo4j:
        condition: service_healthy

  signal-materializer:
    build: ./api
    profiles: ["ops"]
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      COACC_SOURCE_REGISTRY_PATH: /app/docs/source_registry_co_v1.csv
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_ENV: ${APP_ENV:-dev}
      SIGNAL_MATERIALIZER_USER_ID: ${SIGNAL_MATERIALIZER_USER_ID:-system}
    command: >-
      sh -lc 'uv run python scripts/materialize_signals.py --all --user-id "${SIGNAL_MATERIALIZER_USER_ID}"'
    volumes:
      - ./api/scripts:/app/scripts:ro
      - ./config:/app/config:ro
      - ./docs/source_registry_co_v1.csv:/app/docs/source_registry_co_v1.csv:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
