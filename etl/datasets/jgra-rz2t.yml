notes: 'Colombia: Cuentas Claras 2019 — campaign-finance income transactions
  for the 2019 local elections (CNE). 188k rows, fixed historical dataset.
  ing_fecha_comprobante (voucher date) is the watermark; some rows carry
  bogus dates (e.g. year 9201) which land as outlier partitions. Strong
  signal: links candidates to donors via NIT/identification.'
